<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - KSGMS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .complaint-card {
            background-color: var(--surface);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            max-width: 800px;
            margin: 0 auto;
        }

        .complaint-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .complaint-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .complaint-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .file-upload-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 2rem;
            background-color: var(--background);
            transition: var(--transition);
            cursor: pointer;
            text-align: center;
        }

        .file-upload-wrapper:hover {
            border-color: var(--primary);
            background-color: rgba(30, 58, 138, 0.02);
        }

        .file-upload-input {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .file-upload-icon {
            font-size: 2rem;
            color: var(--primary-light);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            justify-content: flex-end;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--secondary), #34D399); /* Green based */
            color: white;
            border: none;
            box-shadow: var(--shadow-md);
            padding: 0.875rem 2rem;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, var(--secondary-hover), #10B981);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            color: white;
        }
        
        [data-theme="dark"] .complaint-card {
            background-color: var(--surface);
            border-color: var(--border);
        }
        
        [data-theme="dark"] .file-upload-wrapper {
            background-color: #0F172A; /* dark background */
            border-color: var(--border);
        }
        
        [data-theme="dark"] .form-input, 
        [data-theme="dark"] .form-select, 
        [data-theme="dark"] .form-textarea {
            background-color: #0F172A;
            border-color: var(--border);
            color: var(--text-primary);
        }

        .form-select, .form-textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background-color: var(--background);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .form-select:focus, .form-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }
        
        /* Mobile adjustment */
        @media (max-width: 640px) {
            .complaint-card {
                padding: 1.5rem;
            }
            .form-actions {
                flex-direction: column;
            }
            .form-actions .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body class="dashboard-page">
    <!-- Navbar -->
    <nav class="navbar dashboard-navbar">
        <div class="nav-container nav-container-fluid">
            <a href="index.html" class="nav-logo" style="text-decoration: none;">
                <img src="logo.jpg" alt="KSGMS Logo" class="logo-icon logo-img"
                    onerror="this.src='https://via.placeholder.com/80x30?text=KSGMS'">
                <span class="logo-text">KSGMS</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="#" class="nav-link">My Complaints</a>
                <a href="submit-complaint.html" class="nav-link active">Submit Complaint</a>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            <div class="user-profile-menu">
                <img src="https://ui-avatars.com/api/?name=User&background=1E3A8A&color=fff" alt="User Avatar"
                    class="avatar-sm">
                <a href="login.html" class="nav-link text-danger"
                    style="color: #ef4444 !important; font-weight: 600;">Logout <i class="fas fa-sign-out-alt"></i></a>
            </div>
            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <main class="dashboard-container">
        <div class="complaint-card">
            <div class="complaint-header">
                <h1 class="complaint-title">Submit a New Complaint</h1>
                <p class="complaint-subtitle">Please provide details about the issue to help us resolve it quickly.</p>
            </div>

            <form class="auth-form" action="dashboard.html" method="get">
                <!-- Complaint Title -->
                <div class="form-group">
                    <label class="form-label" for="complaintTitle">Complaint Title</label>
                    <div class="input-with-icon">
                        <i class="fas fa-heading input-icon"></i>
                        <input type="text" id="complaintTitle" class="form-input" placeholder="Enter a brief title for your complaint" required>
                    </div>
                </div>

                <!-- Category Dropdown -->
                <div class="form-group">
                    <label class="form-label" for="category">Category</label>
                    <select id="category" class="form-select" required style="padding-left: 1rem;">
                        <option value="" disabled selected>Select a category</option>
                        <option value="roads">Roads & Infrastructure</option>
                        <option value="water">Water Supply</option>
                        <option value="electricity">Electricity & Power</option>
                        <option value="waste">Waste Management</option>
                        <option value="public-transport">Public Transport</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <!-- Location -->
                <div class="form-group">
                    <label class="form-label" for="location">Location</label>
                    <div class="input-with-icon">
                        <i class="fas fa-map-marker-alt input-icon"></i>
                        <input type="text" id="location" class="form-input" placeholder="e.g., Trivandrum City Center" required>
                    </div>
                </div>

                <!-- Complaint Description -->
                <div class="form-group">
                    <label class="form-label" for="description">Complaint Description</label>
                    <textarea id="description" class="form-textarea" rows="5" placeholder="Provide detailed information about the issue..." required></textarea>
                </div>

                <!-- Upload Photo -->
                <div class="form-group">
                    <label class="form-label">Upload Photo (Optional)</label>
                    <div class="file-upload-wrapper">
                        <input type="file" class="file-upload-input" accept="image/*">
                        <div>
                            <i class="fas fa-cloud-upload-alt file-upload-icon"></i>
                            <span class="file-upload-text">Click or drag & drop to upload a photo</span>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" onclick="window.location.href='dashboard.html'">Cancel</button>
                    <button type="submit" class="btn btn-submit"><i class="fas fa-paper-plane"></i> Submit Complaint</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Shared script for theme toggle -->
    <script src="script.js"></script>
</body>

</html>
